<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizix — Host Control</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow-y: auto; }
    .screen { position: static; padding: 0; display: none; opacity: 1; pointer-events: all; min-height: 100vh; }
    .screen.active { display: flex; }

    .host-wrap { width: 100%; max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; display: flex; flex-direction: column; gap: 28px; }

    /* Quiz Builder */
    .q-builder { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 24px; position: relative; }
    .q-builder .q-num { position: absolute; top: 16px; right: 16px; font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-muted); }
    .q-builder textarea { resize: vertical; min-height: 80px; }
    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
    .choice-wrap { display: flex; gap: 10px; align-items: center; }
    .choice-wrap input[type="radio"] { accent-color: var(--neon-cyan); width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .choice-label { font-family: var(--font-display); font-size: 0.75rem; color: var(--text-secondary); width: 20px; flex-shrink: 0; }
    .q-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .time-select { background: var(--bg-deep); border: 1px solid rgba(0,245,255,0.15); border-radius: var(--radius-sm); color: var(--text-primary); font-family: var(--font-body); font-size: 0.9rem; padding: 8px 12px; }
    .quiz-title-input { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; color: var(--neon-cyan); }
    .quiz-title-input::placeholder { color: var(--text-muted); }

    /* Lobby */
    .player-list-wrap { max-height: 420px; overflow-y: auto; }

    /* Host Q View */
    .host-q-view { background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: var(--radius-xl); padding: 40px; text-align: center; }
    .host-answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 28px; }
    .host-answer-chip { padding: 18px 20px; border-radius: var(--radius-md); border: 2px solid transparent; font-family: var(--font-body); font-size: 1rem; font-weight: 600; text-align: left; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; }
    .host-answer-chip[data-i="0"] { background: rgba(0,245,255,0.06); border-color: rgba(0,245,255,0.25); }
    .host-answer-chip[data-i="1"] { background: rgba(191,0,255,0.06); border-color: rgba(191,0,255,0.25); }
    .host-answer-chip[data-i="2"] { background: rgba(255,0,110,0.06); border-color: rgba(255,0,110,0.25); }
    .host-answer-chip[data-i="3"] { background: rgba(57,255,20,0.06); border-color: rgba(57,255,20,0.25); }
    .host-answer-chip[data-i="0"].correct-chip { border-color: var(--neon-cyan); background: rgba(0,245,255,0.12); box-shadow: 0 0 30px rgba(0,245,255,0.2); }
    .host-answer-chip[data-i="1"].correct-chip { border-color: var(--neon-purple); background: rgba(191,0,255,0.12); box-shadow: 0 0 30px rgba(191,0,255,0.2); }
    .host-answer-chip[data-i="2"].correct-chip { border-color: var(--neon-pink); background: rgba(255,0,110,0.12); box-shadow: 0 0 30px rgba(255,0,110,0.2); }
    .host-answer-chip[data-i="3"].correct-chip { border-color: var(--neon-green); background: rgba(57,255,20,0.12); box-shadow: 0 0 30px rgba(57,255,20,0.2); }
    .chip-lbl { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; width: 32px; height: 32px; min-width: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .host-answer-chip[data-i="0"] .chip-lbl { background: rgba(0,245,255,0.1); color: var(--neon-cyan); }
    .host-answer-chip[data-i="1"] .chip-lbl { background: rgba(191,0,255,0.1); color: var(--neon-purple); }
    .host-answer-chip[data-i="2"] .chip-lbl { background: rgba(255,0,110,0.1); color: var(--neon-pink); }
    .host-answer-chip[data-i="3"] .chip-lbl { background: rgba(57,255,20,0.1); color: var(--neon-green); }

    .ctrl-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }

    .response-meter { display: flex; align-items: center; gap: 16px; justify-content: center; margin: 20px 0; }
    .resp-fill-wrap { flex: 1; max-width: 300px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .resp-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); border-radius: 3px; transition: width 0.5s ease; }

    /* SLIDE MODE */
    #screen-slide {
      background: var(--bg-void);
      position: fixed; inset: 0; z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 60px;
    }
    #screen-slide.slide-active { display: flex; }

    .slide-top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(3,3,10,0.8); backdrop-filter: blur(12px);
    }

    .slide-game-pin {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.3em; color: var(--text-secondary);
    }
    .slide-game-pin span { color: var(--neon-cyan); font-size: 0.95rem; margin-left: 8px; text-shadow: 0 0 10px rgba(0,245,255,0.5); }

    .slide-q-indicator {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.25em; color: var(--text-muted);
    }

    .slide-resp-bar-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 20px; padding: 16px 40px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(3,3,10,0.8); backdrop-filter: blur(12px);
    }

    .slide-content {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 60px; padding-bottom: 60px;
      width: 100%; max-width: 1100px;
    }

    .slide-timer-outer {
      position: absolute; top: 50%; right: 40px; transform: translateY(-50%);
    }

    .slide-exit-btn {
      position: fixed; top: 16px; right: 16px; z-index: 200;
      background: rgba(255,0,110,0.15); border: 1px solid rgba(255,0,110,0.4);
      color: var(--neon-pink); border-radius: var(--radius-md);
      padding: 8px 14px; font-family: var(--font-display); font-size: 0.65rem;
      letter-spacing: 0.1em; cursor: pointer; display: none; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .slide-exit-btn.visible { display: flex; }
    .slide-exit-btn:hover { background: rgba(255,0,110,0.25); }

    @media (max-width: 600px) {
      .choices-grid, .host-answer-grid { grid-template-columns: 1fr; }
      #screen-slide { padding: 20px; }
      .slide-top-bar, .slide-resp-bar-wrap { padding: 14px 20px; }
    }
  </style>
</head>
<body>

<!-- SLIDE MODE OVERLAY -->
<div id="screen-slide">
  <div class="slide-top-bar">
    <div class="slide-game-pin">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" style="display:inline; vertical-align:middle; margin-right:4px;"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      GAME PIN <span id="slide-pin-display">——</span>
    </div>
    <div class="slide-q-indicator" id="slide-q-indicator">QUESTION 1 OF 10</div>
    <div style="font-family:var(--font-display); font-size:0.65rem; letter-spacing:0.1em; color:var(--text-secondary);">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" style="display:inline; vertical-align:middle; margin-right:4px;"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      SLIDE MODE
    </div>
  </div>

  <div class="slide-timer-outer">
    <div class="timer-ring" id="slide-timer-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="35"/>
        <circle class="ring-progress" id="slide-ring-progress" cx="40" cy="40" r="35"/>
      </svg>
      <div class="timer-number" id="slide-timer-display">20</div>
    </div>
  </div>

  <div class="slide-content">
    <div class="question-text" id="slide-q-text" style="font-size:clamp(1.6rem,3.5vw,2.8rem); margin-bottom:40px;">Loading...</div>
    <div class="slide-choices" id="slide-choices"></div>

    <div style="margin-top:28px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
      <button class="btn btn-secondary" id="slide-reveal-btn" style="font-size:0.7rem; padding:10px 20px; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        Reveal Answer
      </button>
      <button class="btn btn-primary" id="slide-next-btn" style="font-size:0.7rem; padding:10px 20px; width:auto; display:flex; align-items:center; gap:6px;">
        Next Question
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 12h14"/></svg>
      </button>
      <button class="btn btn-danger" id="slide-end-btn" style="font-size:0.7rem; padding:10px 20px; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        End Game
      </button>
    </div>
  </div>

  <div class="slide-resp-bar-wrap">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" style="color:var(--text-muted); flex-shrink:0;"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <div style="font-family:var(--font-display); font-size:0.7rem; color:var(--text-secondary); white-space:nowrap;" id="slide-resp-count">0 / 0</div>
    <div class="slide-resp-fill-wrap"><div class="slide-resp-fill" id="slide-resp-fill" style="width:0%"></div></div>
    <div style="font-family:var(--font-display); font-size:0.7rem; color:var(--neon-cyan);" id="slide-resp-pct">0%</div>
  </div>
</div>

<button class="slide-exit-btn" id="slide-exit-btn">
  <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  Exit Slide Mode
</button>

<!-- SCREEN: CREATE QUIZ -->
<div class="screen active" id="screen-create">
  <div class="host-wrap">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="logo" style="font-size:1.8rem;">Quiz<span>ix</span></div>
        <div class="tagline" style="font-size:0.7rem;">Host Control Panel</div>
      </div>
      <a href="index.html" class="btn btn-secondary" style="text-decoration:none; display:inline-flex; align-items:center; gap:6px;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M19 12H5"/></svg>
        Join as Player
      </a>
    </div>

    <div class="panel">
      <div class="section-title">Quiz Setup</div>
      <div class="section-sub" style="margin-bottom:20px;">Configure Your Game</div>
      <div class="input-group">
        <div class="input-label">Quiz Title</div>
        <input type="text" class="quiz-title-input" id="quiz-title" placeholder="e.g. Ultimate Science Bowl" maxlength="60" />
      </div>
    </div>

    <div id="questions-container"></div>

    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-secondary" id="btn-add-q" style="flex:1; display:inline-flex; align-items:center; gap:6px; justify-content:center;">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add Question
      </button>
      <button class="btn btn-primary" id="btn-create-room" style="flex:2;">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Create Room & Go Live
      </button>
    </div>
  </div>
</div>

<!-- SCREEN: LOBBY HOST -->
<div class="screen" id="screen-lobby-host">
  <div class="host-wrap">
    <div class="panel" style="max-width:100%;">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:20px;">
        <div>
          <div class="section-title">Live Room</div>
          <div class="room-code-display" style="text-align:left; margin-bottom:0;">
            <div class="room-code-label">Game PIN</div>
            <div class="room-code-value" id="host-room-code">——</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="section-title">Players</div>
          <div style="font-family:var(--font-display); font-size:2.5rem; font-weight:900; color:var(--neon-cyan); text-shadow:0 0 20px rgba(0,245,255,0.4);" id="host-player-count">0</div>
          <div style="font-family:var(--font-display); font-size:0.65rem; letter-spacing:0.15em; color:var(--text-secondary);">JOINED</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="player-list-wrap" id="host-player-list"></div>
      <div class="divider"></div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-start-game" style="flex:2; display:inline-flex; align-items:center; gap:8px; justify-content:center;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Start Game
        </button>
        <button class="btn btn-danger" id="btn-end-lobby" style="flex:1; display:inline-flex; align-items:center; gap:6px; justify-content:center;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          End Room
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: HOST QUESTION VIEW -->
<div class="screen" id="screen-host-question">
  <div class="host-wrap">
    <div class="host-q-view">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <div class="question-number" id="host-q-label" style="margin-bottom:0;">Question 1 of 10</div>
        <div class="timer-wrap" style="margin-bottom:0;">
          <div class="timer-ring" id="host-timer-ring">
            <svg width="60" height="60" viewBox="0 0 80 80">
              <circle class="ring-bg" cx="40" cy="40" r="35"/>
              <circle class="ring-progress" id="host-ring-progress" cx="40" cy="40" r="35"/>
            </svg>
            <div class="timer-number" id="host-timer-display" style="font-size:1.1rem;">20</div>
          </div>
        </div>
      </div>

      <div class="response-meter">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" style="color:var(--text-muted);"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <div style="font-family:var(--font-display); font-size:0.7rem; letter-spacing:0.1em; color:var(--text-secondary); white-space:nowrap;" id="resp-count">0 / 0</div>
        <div class="resp-fill-wrap"><div class="resp-fill" id="resp-fill" style="width:0%"></div></div>
        <div style="font-family:var(--font-display); font-size:0.7rem; color:var(--neon-cyan);" id="resp-pct">0%</div>
      </div>

      <div class="question-text" id="host-q-text" style="font-size:1.5rem; margin-bottom:0;">Loading...</div>
      <div class="host-answer-grid" id="host-answer-grid"></div>

      <div class="ctrl-row">
        <button class="btn btn-secondary" id="btn-slide-mode" style="display:inline-flex; align-items:center; gap:6px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Slide Mode
        </button>
        <button class="btn btn-secondary" id="btn-reveal-answer" style="display:inline-flex; align-items:center; gap:6px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          Reveal Answer
        </button>
        <button class="btn btn-primary" id="btn-show-lb" style="display:inline-flex; align-items:center; gap:6px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Leaderboard
        </button>
        <button class="btn btn-secondary" id="btn-next-q" style="display:inline-flex; align-items:center; gap:6px;">
          Next Question
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 12h14"/></svg>
        </button>
        <button class="btn btn-danger" id="btn-end-game" style="display:inline-flex; align-items:center; gap:6px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
          End Game
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: HOST LEADERBOARD -->
<div class="screen" id="screen-host-lb">
  <div class="host-wrap">
    <div class="panel" style="max-width:100%;">
      <div style="text-align:center; margin-bottom:28px;">
        <div class="section-title">Leaderboard</div>
        <div class="section-sub">After Question <span id="host-lb-qnum">1</span></div>
      </div>
      <div class="leaderboard" id="host-leaderboard" style="max-width:600px; margin:0 auto;"></div>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:28px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-continue-from-lb" style="display:inline-flex; align-items:center; gap:8px;">
          Continue
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 12h14"/></svg>
        </button>
        <button class="btn btn-danger" id="btn-end-from-lb" style="display:inline-flex; align-items:center; gap:6px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          End Game
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: HOST FINAL -->
<div class="screen" id="screen-host-final">
  <div class="host-wrap">
    <div class="panel" style="max-width:100%; text-align:center;">
      <div class="logo" style="font-size:2rem; margin-bottom:8px;">Quiz<span>ix</span></div>
      <div class="section-title" style="margin-bottom:20px;">Game Complete</div>
      <div style="display:flex; justify-content:center; margin-bottom:8px;" id="final-trophy-icon"></div>
      <div style="font-family:var(--font-display); font-size:0.7rem; letter-spacing:0.25em; color:var(--text-secondary); margin-bottom:8px;">WINNER</div>
      <div id="winner-name" style="font-family:var(--font-display); font-size:2rem; font-weight:700; color:var(--neon-cyan); text-shadow:0 0 30px rgba(0,245,255,0.5); margin-bottom:28px;">—</div>
      <div class="leaderboard" id="final-host-leaderboard" style="max-width:600px; margin:0 auto 28px;"></div>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-new-game" style="display:inline-flex; align-items:center; gap:8px; width:auto;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          New Game
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDngjiAp6x6gUEH7QC5frVlyaFRbCbMi4",
  authDomain: "quizix-b8059.firebaseapp.com",
  projectId: "quizix-b8059",
  storageBucket: "quizix-b8059.firebasestorage.app",
  messagingSenderId: "383192909945",
  appId: "1:383192909945:web:bcbc77e35a659c82fc6ca8",
  databaseURL: "https://quizix-b8059-default-rtdb.firebaseio.com/"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== STATE =====
let roomCode = null, quiz = { title: '', questions: [] };
let currentQIndex = 0, hostTimerInterval = null, unsubRoom = null, answerRevealed = false;
let slideMode = false;

const CIRCUMFERENCE = 2 * Math.PI * 35;
const CHOICE_LABELS = ['A','B','C','D'];

// Medal SVGs
const MEDAL_SVG = [
  `<svg width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6" stroke="#ffe600" stroke-width="1.5" fill="rgba(255,230,0,0.15)"/><path stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>`,
  `<svg width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6" stroke="#c0c0d0" stroke-width="1.5" fill="rgba(192,192,208,0.1)"/><path stroke="#c0c0d0" stroke-width="1.5" stroke-linecap="round" d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>`,
  `<svg width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6" stroke="#cd8040" stroke-width="1.5" fill="rgba(205,128,64,0.1)"/><path stroke="#cd8040" stroke-width="1.5" stroke-linecap="round" d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>`,
];

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2800);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== QUESTION BUILDER =====
let qCount = 0;
function addQuestion(data = null) {
  qCount++;
  const idx = qCount;
  const container = document.getElementById('questions-container');
  const div = document.createElement('div');
  div.className = 'q-builder'; div.dataset.idx = idx;
  div.innerHTML = `
    <div class="q-num">Q${idx}</div>
    <div class="input-group">
      <div class="input-label">Question Text</div>
      <textarea class="q-text" placeholder="Enter your question here..." maxlength="300">${data ? data.question : ''}</textarea>
    </div>
    <div class="choices-grid">
      ${[0,1,2,3].map(i => `
        <div class="choice-wrap">
          <input type="radio" name="correct-${idx}" value="${i}" ${data && data.correct===i ? 'checked' : (i===0 && !data ? 'checked' : '')}>
          <div class="choice-label">${CHOICE_LABELS[i]}</div>
          <input type="text" class="choice-${i}" placeholder="Choice ${CHOICE_LABELS[i]}..." maxlength="120" value="${data ? (data.choices[i]||'') : ''}">
        </div>
      `).join('')}
    </div>
    <div class="q-actions">
      <label class="input-label" style="margin:0; display:flex; align-items:center; gap:8px;">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Time:
        <select class="time-select q-time">
          ${[10,15,20,30,45,60].map(t => `<option value="${t}" ${data&&data.timeLimit===t?'selected':(t===20&&!data?'selected':'')}>${t}s</option>`).join('')}
        </select>
      </label>
      <button class="btn btn-danger" style="padding:8px 14px; font-size:0.65rem; display:inline-flex; align-items:center; gap:5px;" onclick="removeQuestion(this)">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        Remove
      </button>
    </div>
  `;
  container.appendChild(div);
}

window.removeQuestion = function(btn) {
  if (document.querySelectorAll('.q-builder').length <= 1) { toast('Need at least 1 question', 'error'); return; }
  btn.closest('.q-builder').remove();
  document.querySelectorAll('.q-builder').forEach((el, i) => { el.querySelector('.q-num').textContent = `Q${i+1}`; });
};

document.getElementById('btn-add-q').addEventListener('click', () => addQuestion());

addQuestion({ question: "What does HTML stand for?", choices: ["HyperText Markup Language","High Tech Modern Language","HyperText Modern Links","HyperText Machine Language"], correct: 0, timeLimit: 20 });
addQuestion({ question: "Which planet is closest to the Sun?", choices: ["Venus","Earth","Mars","Mercury"], correct: 3, timeLimit: 15 });
addQuestion({ question: "What is the chemical symbol for Gold?", choices: ["Go","Au","Ag","Gd"], correct: 1, timeLimit: 20 });

// ===== BUILD QUIZ FROM DOM =====
function buildQuizFromDOM() {
  const title = document.getElementById('quiz-title').value.trim() || 'Quizix Game';
  const questions = []; let valid = true;
  document.querySelectorAll('.q-builder').forEach((el, i) => {
    const questionText = el.querySelector('.q-text').value.trim();
    if (!questionText) { toast(`Q${i+1}: Enter a question`, 'error'); valid = false; return; }
    const choices = [0,1,2,3].map(j => el.querySelector(`.choice-${j}`).value.trim());
    if (choices.some(c => !c)) { toast(`Q${i+1}: Fill in all choices`, 'error'); valid = false; return; }
    const correctRadio = el.querySelector(`input[name="correct-${el.dataset.idx}"]:checked`);
    questions.push({ question: questionText, choices, correct: correctRadio ? parseInt(correctRadio.value) : 0, timeLimit: parseInt(el.querySelector('.q-time').value) });
  });
  if (!valid) return null;
  return { title, questions };
}

// ===== CREATE ROOM =====
document.getElementById('btn-create-room').addEventListener('click', async () => {
  const q = buildQuizFromDOM();
  if (!q) return;
  quiz = q;
  roomCode = String(Math.floor(100000 + Math.random() * 900000));
  await set(ref(db, `rooms/${roomCode}`), { status: 'lobby', currentQuestion: 0, questionStartTime: 0, quiz, createdAt: Date.now(), host: true });
  document.getElementById('host-room-code').textContent = roomCode;
  document.getElementById('slide-pin-display').textContent = roomCode;
  showScreen('screen-lobby-host');
  startHostRoomListener();
  toast('Room created! Share the PIN.', 'success');
});

// ===== HOST ROOM LISTENER =====
function startHostRoomListener() {
  if (unsubRoom) unsubRoom();
  unsubRoom = onValue(ref(db, `rooms/${roomCode}`), snap => {
    if (!snap.exists()) return;
    const room = snap.val();
    const players = room.players || {};
    const pCount = Object.keys(players).length;
    document.getElementById('host-player-count').textContent = pCount;

    // Lobby player list
    if (document.getElementById('screen-lobby-host').classList.contains('active')) {
      const listEl = document.getElementById('host-player-list');
      listEl.innerHTML = '';
      Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0)).forEach(p => {
        const el = document.createElement('div');
        el.className = 'player-row';
        const avatarBg = p.color || 'rgba(0,245,255,0.15)';
        const avatarIcon = p.avatar || p.name.slice(0,2).toUpperCase();
        el.innerHTML = `<div class="p-avatar" style="background:${avatarBg};">${avatarIcon}</div><div class="p-name">${p.name}</div><div class="p-score">${(p.score||0).toLocaleString()} pts</div>`;
        listEl.appendChild(el);
      });
    }

    // Response count during question
    if (room.status === 'question' && (document.getElementById('screen-host-question').classList.contains('active') || slideMode)) {
      const qi = room.currentQuestion;
      let answered = 0;
      Object.values(players).forEach(p => { if (p.answers && p.answers[qi] !== undefined) answered++; });
      const pct = pCount > 0 ? Math.round(answered / pCount * 100) : 0;
      const countText = `${answered} / ${pCount}`;
      const pctText = pct + '%';
      document.getElementById('resp-count').textContent = countText;
      document.getElementById('resp-fill').style.width = pct + '%';
      document.getElementById('resp-pct').textContent = pctText;
      // Slide mode sync
      document.getElementById('slide-resp-count').textContent = countText;
      document.getElementById('slide-resp-fill').style.width = pct + '%';
      document.getElementById('slide-resp-pct').textContent = pctText;
    }
  });
}

// ===== START GAME =====
document.getElementById('btn-start-game').addEventListener('click', async () => {
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  if (!snap.val() || Object.keys(snap.val()).length === 0) { toast('Wait for players to join!', 'error'); return; }
  currentQIndex = 0; launchQuestion(0);
});

// ===== LAUNCH QUESTION =====
async function launchQuestion(qi) {
  answerRevealed = false;
  const q = quiz.questions[qi];
  await update(ref(db, `rooms/${roomCode}`), { status: 'question', currentQuestion: qi, questionStartTime: Date.now() });

  // Host normal view
  document.getElementById('host-q-label').textContent = `Question ${qi+1} of ${quiz.questions.length}`;
  document.getElementById('host-q-text').textContent = q.question;
  const grid = document.getElementById('host-answer-grid');
  grid.innerHTML = '';
  q.choices.forEach((c, i) => {
    const chip = document.createElement('div');
    chip.className = 'host-answer-chip'; chip.dataset.i = i;
    chip.innerHTML = `<div class="chip-lbl">${CHOICE_LABELS[i]}</div><span>${c}</span>`;
    grid.appendChild(chip);
  });
  document.getElementById('resp-count').textContent = '0 / 0';
  document.getElementById('resp-fill').style.width = '0%';
  document.getElementById('resp-pct').textContent = '0%';

  // Slide view
  document.getElementById('slide-q-indicator').textContent = `QUESTION ${qi+1} OF ${quiz.questions.length}`;
  document.getElementById('slide-q-text').textContent = q.question;
  const slideChoices = document.getElementById('slide-choices');
  slideChoices.innerHTML = '';
  q.choices.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'slide-choice'; el.dataset.i = i;
    el.innerHTML = `<div class="slide-lbl">${CHOICE_LABELS[i]}</div><span>${c}</span>`;
    slideChoices.appendChild(el);
  });
  document.getElementById('slide-resp-count').textContent = '0 / 0';
  document.getElementById('slide-resp-fill').style.width = '0%';
  document.getElementById('slide-resp-pct').textContent = '0%';

  showScreen('screen-host-question');
  startHostTimer(q.timeLimit || 20);
}

// ===== HOST TIMER =====
function startHostTimer(totalSecs) {
  clearHostTimer();
  const startTime = Date.now();

  function tickRing(ringEl, progressEl, displayEl) {
    const elapsed = (Date.now() - startTime) / 1000;
    const remaining = Math.max(0, totalSecs - elapsed);
    const frac = remaining / totalSecs;
    displayEl.textContent = Math.ceil(remaining);
    progressEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
    progressEl.style.strokeDasharray = CIRCUMFERENCE;
    ringEl.className = 'timer-ring';
    if (remaining <= 5) ringEl.classList.add('danger');
    else if (remaining <= 10) ringEl.classList.add('warning');
    return remaining;
  }

  const tick = () => {
    const rem = tickRing(
      document.getElementById('host-timer-ring'),
      document.getElementById('host-ring-progress'),
      document.getElementById('host-timer-display')
    );
    tickRing(
      document.getElementById('slide-timer-ring'),
      document.getElementById('slide-ring-progress'),
      document.getElementById('slide-timer-display')
    );
    if (rem <= 0) { clearHostTimer(); if (!answerRevealed) revealHostAnswer(); }
  };
  tick(); hostTimerInterval = setInterval(tick, 200);
}
function clearHostTimer() { if (hostTimerInterval) { clearInterval(hostTimerInterval); hostTimerInterval = null; } }

// ===== REVEAL ANSWER =====
function revealHostAnswer() {
  answerRevealed = true; clearHostTimer();
  const q = quiz.questions[currentQIndex];
  // Normal view
  document.querySelectorAll('.host-answer-chip').forEach((chip, i) => { if (i === q.correct) chip.classList.add('correct-chip'); });
  // Slide view
  document.querySelectorAll('.slide-choice').forEach((el, i) => { if (i === q.correct) el.classList.add('slide-correct'); });
}

document.getElementById('btn-reveal-answer').addEventListener('click', revealHostAnswer);
document.getElementById('slide-reveal-btn').addEventListener('click', revealHostAnswer);

// ===== SLIDE MODE =====
document.getElementById('btn-slide-mode').addEventListener('click', () => {
  slideMode = true;
  document.getElementById('screen-slide').classList.add('slide-active');
  document.getElementById('slide-exit-btn').classList.add('visible');
});
document.getElementById('slide-exit-btn').addEventListener('click', () => {
  slideMode = false;
  document.getElementById('screen-slide').classList.remove('slide-active');
  document.getElementById('slide-exit-btn').classList.remove('visible');
});
document.getElementById('slide-next-btn').addEventListener('click', () => {
  if (!answerRevealed) revealHostAnswer();
  clearHostTimer();
  currentQIndex++;
  if (currentQIndex >= quiz.questions.length) { endGame(); return; }
  launchQuestion(currentQIndex);
});
document.getElementById('slide-end-btn').addEventListener('click', endGame);

// ===== LEADERBOARD =====
document.getElementById('btn-show-lb').addEventListener('click', async () => {
  await update(ref(db, `rooms/${roomCode}`), { status: 'leaderboard' });
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  showHostLeaderboard(snap.val() || {});
});

function showHostLeaderboard(players) {
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  const lb = document.getElementById('host-leaderboard'); lb.innerHTML = '';
  sorted.slice(0,10).forEach((p,i)=>{
    const el = document.createElement('div'); el.className = 'lb-item'; el.style.animationDelay = (i*0.07)+'s';
    const rankHTML = i<3 ? MEDAL_SVG[i] : `<span style="font-family:var(--font-display);font-size:0.75rem;color:var(--text-muted);">${i+1}</span>`;
    const avatarEl = p.avatar ? `<div class="lb-avatar" style="background:${p.color||'rgba(0,245,255,0.1)'};font-size:1rem;">${p.avatar}</div>` : '';
    el.innerHTML = `<div class="lb-rank">${rankHTML}</div>${avatarEl}<div class="lb-name">${p.name}</div><div class="lb-score">${(p.score||0).toLocaleString()}</div>`;
    lb.appendChild(el);
  });
  document.getElementById('host-lb-qnum').textContent = currentQIndex + 1;
  showScreen('screen-host-lb');
}

// ===== NEXT QUESTION =====
document.getElementById('btn-next-q').addEventListener('click', async () => {
  if (!answerRevealed) revealHostAnswer();
  clearHostTimer(); currentQIndex++;
  if (currentQIndex >= quiz.questions.length) { endGame(); return; }
  launchQuestion(currentQIndex);
});
document.getElementById('btn-continue-from-lb').addEventListener('click', () => {
  currentQIndex++;
  if (currentQIndex >= quiz.questions.length) { endGame(); return; }
  launchQuestion(currentQIndex);
});

// ===== END GAME =====
async function endGame() {
  clearHostTimer();
  // Exit slide mode if active
  slideMode = false;
  document.getElementById('screen-slide').classList.remove('slide-active');
  document.getElementById('slide-exit-btn').classList.remove('visible');

  await update(ref(db, `rooms/${roomCode}`), { status: 'final' });
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = snap.val() || {};
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);

  // Trophy SVG
  document.getElementById('final-trophy-icon').innerHTML = `<svg width="80" height="80" fill="none" viewBox="0 0 24 24"><path stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M12 15a6 6 0 100-12 6 6 0 000 12zM8.21 13.89L7 23l5-3 5 3-1.21-9.12" fill="rgba(255,230,0,0.08)"/><path stroke="#ffe600" stroke-width="1.5" stroke-linecap="round" d="M5 5H3a2 2 0 000 4h2M19 5h2a2 2 0 010 4h-2"/></svg>`;
  document.getElementById('winner-name').textContent = sorted[0] ? sorted[0].name : '—';

  const lb = document.getElementById('final-host-leaderboard'); lb.innerHTML = '';
  sorted.slice(0,10).forEach((p,i)=>{
    const el = document.createElement('div'); el.className = 'lb-item'; el.style.animationDelay = (i*0.08)+'s';
    const rankHTML = i<3 ? MEDAL_SVG[i] : `<span style="font-family:var(--font-display);font-size:0.75rem;color:var(--text-muted);">${i+1}</span>`;
    const avatarEl = p.avatar ? `<div class="lb-avatar" style="background:${p.color||'rgba(0,245,255,0.1)'};font-size:1rem;">${p.avatar}</div>` : '';
    el.innerHTML = `<div class="lb-rank">${rankHTML}</div>${avatarEl}<div class="lb-name">${p.name}</div><div class="lb-score">${(p.score||0).toLocaleString()}</div>`;
    lb.appendChild(el);
  });
  showScreen('screen-host-final');
}

document.getElementById('btn-end-game').addEventListener('click', endGame);
document.getElementById('btn-end-from-lb').addEventListener('click', endGame);
document.getElementById('btn-end-lobby').addEventListener('click', async () => { if (roomCode) await remove(ref(db, `rooms/${roomCode}`)); window.location.reload(); });
document.getElementById('btn-new-game').addEventListener('click', () => { if (roomCode) remove(ref(db, `rooms/${roomCode}`)); window.location.reload(); });
</script>
